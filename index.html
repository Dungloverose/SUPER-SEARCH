<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XD Super App Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* LAYOUT CHIA 2 CỘT */
        .left-panel { width: 40%; border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .right-panel { width: 60%; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }

        /* TÌM KIẾM */
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--accent); background: var(--card); color: white; margin-bottom: 20px; outline: none; font-size: 16px; box-sizing: border-box; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .app-btn { background: var(--card); border: 1px solid #475569; padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .app-btn:hover { border-color: var(--accent); background: #2d3748; }

        /* CỘT PHẢI */
        .cam-sec { display: flex; gap: 10px; align-items: center; }
        .cam-btn { background: var(--card); padding: 10px 15px; border-radius: 10px; border: 1px solid var(--accent); cursor: pointer; }
        .cam-label { flex: 1; background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid #334155; }

        .ai-sec { 
            background: linear-gradient(135deg, #6366f1, #38bdf8); 
            color: white; padding: 20px; border-radius: 15px; 
            font-weight: bold; text-align: center; font-size: 20px; 
            cursor: pointer; border: none;
        }

        /* NHẠC & THỜI TIẾT */
        .bottom-sec { display: flex; gap: 15px; flex: 1; min-height: 0; }
        
        /* Spotify Player */
        .music-box { flex: 1; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
        
        /* Weather Widget */
        .weather-box { 
            flex: 1; background: linear-gradient(to bottom, #1e293b, #0f172a); 
            border-radius: 15px; border: 1px solid #334155; padding: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <!-- CỘT TRÁI -->
    <div class="left-panel">
        <input type="text" id="q" class="search-box" placeholder="Tìm kiếm nhanh...">
        <div class="app-grid">
            <div class="app-btn" onclick="openLink('yt')">YouTube</div>
            <div class="app-btn" onclick="openLink('tk')">TikTok</div>
            <div class="app-btn" onclick="openLink('fb')">Facebook</div>
            <div class="app-btn" onclick="openLink('sp')">Shopee</div>
            <div class="app-btn" onclick="openLink('gg')">Google</div>
            <div class="app-btn" onclick="openLink('mp')">Maps</div>
        </div>
    </div>

    <!-- CỘT PHẢI -->
    <div class="right-panel">
        <div class="cam-sec">
            <div class="cam-btn">📷</div>
            <div class="cam-label">Camera Hệ Thống</div>
        </div>

        <button class="ai-sec" onclick="openLink('ai')">AI GEMINI</button>

        <div class="bottom-sec">
            <!-- PHẦN NHẠC SPOTIFY REAL -->
            <div class="music-box">
                <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGvPBcmT?utm_source=generator&theme=0" 
                    width="100%" height="100%" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                </iframe>
            </div>

            <!-- PHẦN DỰ BÁO THỜI TIẾT -->
            <div class="weather-box">
                <div id="ww_66e04d603a115" v='1.3' loc='auto' a='{"t":"horizontal","lang":"vi","sl_lform":"c","sl_l6":"1","sl_l1":"1","sl_l2":"1","sl_l3":"1","sl_l4":"1","sl_l5":"1","ids":[],"unit":"c","repsonse":true}'>
                    <a href="https://weatherwidget.org/vi/" id="ww_66e04d603a115_u" target="_blank">Widget thời tiết cho website</a>
                </div>
                <script async src="https://app1.weatherwidget.org/js/?id=ww_66e04d603a115"></script>
            </div>
        </div>
    </div>

    <script>
        function openLink(key) {
            const val = document.getElementById('q').value;
            if (!val && key !== 'ai') {
                alert("Nhập từ khóa tìm kiếm!");
                return;
            }

            const query = encodeURIComponent(val);
            const links = {
                yt: 'https://www.youtube.com/results?search_query=',
                tk: 'https://www.tiktok.com/search?q=',
                fb: 'https://www.facebook.com/search/top/?q=',
                sp: 'https://shopee.vn/search?keyword=',
                gg: 'https://www.google.com/search?q=',
                mp: 'https://www.google.com/maps/search/',
                ai: 'https://gemini.google.com/'
            };

            let finalUrl = links[key];
            if (key !== 'ai') finalUrl += query;

            // Dùng cách này để lách lỗi "Blocked" trên Nativefier
            const a = document.createElement('a');
            a.href = finalUrl;
            a.target = '_blank';
            a.click();
        }
    </script>
</body>
</html>
