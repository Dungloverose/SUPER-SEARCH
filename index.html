<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XD Super App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { 
            font-family: sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }
        /* CỘT TRÁI */
        .left-panel { width: 40%; border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        .search-box { width: 100%; padding: 12px; border-radius: 20px; border: 2px solid var(--accent); background: var(--card); color: white; margin-bottom: 20px; outline: none; box-sizing: border-box;}
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .app-btn { background: var(--card); border: 1px solid #334155; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; font-size: 13px; }
        .app-btn:active { background: var(--accent); color: black; }

        /* CỘT PHẢI */
        .right-panel { width: 60%; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .cam-sec { display: flex; gap: 10px; }
        .cam-btn { background: var(--card); padding: 10px 15px; border-radius: 10px; border: 1px solid var(--accent); cursor: pointer; }
        .cam-label { flex: 1; background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid #334155; }
        .ai-sec { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; padding: 20px; border-radius: 15px; font-weight: bold; text-align: center; font-size: 22px; cursor: pointer; border: none; }
        .bottom-sec { display: flex; gap: 15px; flex: 1; }
        .music-box { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; }
        .fav-box { flex: 1; background: var(--card); border-radius: 15px; border: 1px solid #334155; padding: 15px; }
    </style>
</head>
<body>
    <div class="left-panel">
        <input type="text" id="q" class="search-box" placeholder="TÌM KIẾM...">
        <div class="app-grid">
            <div class="app-btn" onclick="go('yt')">YouTube</div>
            <div class="app-btn" onclick="go('tk')">TikTok</div>
            <div class="app-btn" onclick="go('fb')">Facebook</div>
            <div class="app-btn" onclick="go('sp')">Shopee</div>
            <div class="app-btn" onclick="go('gg')">Google</div>
            <div class="app-btn" onclick="go('mp')">Maps</div>
        </div>
    </div>
    <div class="right-panel">
        <div class="cam-sec">
            <div class="cam-btn" onclick="alert('Mở máy ảnh...')">📷</div>
            <div class="cam-label">Chụp Ảnh</div>
        </div>
        <button class="ai-sec" onclick="window.open('https://gemini.google.com/', '_blank')">AI GEMINI</button>
        <div class="bottom-sec">
            <div class="music-box" onclick="go('sf')">NHẠC</div>
            <div class="fav-box">
                <h4 style="margin:0">TAB yêu thích</h4>
                <p style="font-size:12px; color:#94a3b8; margin-top:10px">• Danh sách trống</p>
            </div>
        </div>
    </div>
    <script>
        function go(app) {
            const val = document.getElementById('q').value;
            const encoded = encodeURIComponent(val);
            const urls = {
                yt: { w: 'https://youtube.com/results?search_query=', a: 'youtube://results?search_query=' },
                tk: { w: 'https://tiktok.com/search?q=', a: 'snssdk1128://search?keyword=' },
                fb: { w: 'https://facebook.com/search/top/?q=', a: 'fb://search/?q=' },
                sp: { w: 'https://shopee.vn/search?keyword=', a: 'shopeevn://search?keyword=' },
                gg: { w: 'https://google.com/search?q=', a: 'googlechrome://' },
                mp: { w: 'https://google.com/maps/search/', a: 'comgooglemaps://?q=' },
                sf: { w: 'https://open.spotify.com/search/', a: 'spotify:search:' }
            };
            if (!val && app !== 'sf') return alert("Nhập từ khóa!");
            const start = Date.now();
            window.location.href = urls[app].a + encoded;
            setTimeout(() => { if (Date.now() - start < 800) window.open(urls[app].w + encoded, '_blank'); }, 500);
        }
    </script>
</body>
</html>
